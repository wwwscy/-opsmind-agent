spring:
  profiles:
    active: milvus
  application:
    name: opsmind-agent

  datasource:
    url: jdbc:mysql://mysql:3306/opsmind?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: opsmind
    password: opsmind_pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

# Actuator 暴露指标端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# MiniMax LLM
minimax:
  api-key: ${MINIMAX_API_KEY:your-api-key-here}
  base-url: https://api.minimax.chat/v1
  chat-model: MiniMax-M2.1
  embedding-model: embo01

# 监控告警配置
monitoring:
  collect-interval-seconds: 30
  feishu-webhook: ${FEISHU_WEBHOOK_URL:}
  feishu-enabled: ${FEISHU_ENABLED:true}
  feishu-suppress-minutes: 10
  auto-diagnosis-enabled: true
  diagnosis-suppress-minutes: 10
  alert-rules:
    - name: CPU异常
      metric: app.cpu.spike
      target: demo-pod
      condition: ">"
      threshold: 0.5
      duration-seconds: 30
      severity: high
    - name: 内存泄漏
      metric: app.memory.leak
      target: demo-pod
      condition: ">"
      threshold: 0.5
      duration-seconds: 30
      severity: critical
    - name: JVM活跃线程数过高
      metric: jvm.threads.live
      target: demo-pod
      condition: ">"
      threshold: 100
      duration-seconds: 60
      severity: medium

react:
  max-iterations: 8
  timeout-seconds: 90

# Milvus Vector DB
milvus:
  host: ${MILVUS_HOST:milvus}
  port: ${MILVUS_PORT:19530}
  collection-name: opsmind_kb
  dimension: 384

server:
  port: 8080
